{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Reserva</title>

    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <div class="alert alert-warning text-center display-6">
        EDITAR RESERVA
    </div>

    {% if errores %}
        <div class="alert alert-danger">
            {{ errores }}
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input
                type="text"
                name="nombre_persona"
                class="form-control"
                value="{{ reserva.nombre_persona }}"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input
                type="text"
                name="telefono"
                class="form-control"
                value="{{ reserva.telefono }}"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha de reserva</label>
            <input
                type="date"
                name="fecha_reserva"
                class="form-control"
                value="{{ reserva.fecha_reserva|date:'Y-m-d' }}"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Hora de reserva</label>
            <input
                type="time"
                name="hora_reserva"
                class="form-control"
                value="{{ reserva.hora_reserva|time:'H:i' }}"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Cantidad de personas</label>
            <input
                type="number"
                name="cantidad_personas"
                class="form-control"
                value="{{ reserva.cantidad_personas }}"
                min="1"
                max="15"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Estado</label>

            <select
                name="estado"
                class="form-select"
                required>

                <option value="COMPLETADA"
                    {% if reserva.estado == "COMPLETADA" %}selected{% endif %}>
                    Completada
                </option>

                <option value="ANULADA"
                    {% if reserva.estado == "ANULADA" %}selected{% endif %}>
                    Anulada
                </option>

                <option value="NO_ASISTEN"
                    {% if reserva.estado == "NO_ASISTEN" %}selected{% endif %}>
                    No asisten
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">Mesa</label>

            <select
                name="mesa"
                class="form-select"
                required>

                {% for mesa in mesas %}

                    <option
                        value="{{ mesa.id }}"
                        {% if mesa.id == reserva.mesa.id %}selected{% endif %}>

                        Mesa {{ mesa.numero }} (Capacidad {{ mesa.capacidad }})

                    </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">Observación</label>

            <textarea
                name="observacion"
                class="form-control"
                rows="4">{{ reserva.observacion }}</textarea>

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            Guardar cambios

        </button>

        <a
            href="{% url 'lista_reservas' %}"
            class="btn btn-secondary">

            Volver

        </a>

    </form>

</body>
</html>
