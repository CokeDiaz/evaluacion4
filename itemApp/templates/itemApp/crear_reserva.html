<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Reserva</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

    <h1 class="mb-4">
        Crear Nueva Reserva
    </h1>


    {% if errores %}
        <div class="alert alert-danger">
            {{ errores }}
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label>Nombre</label>
            <input 
                type="text" 
                name="nombre_persona"
                class="form-control"
                required>
        </div>
        <div class="mb-3">
            <label>Teléfono</label>
            <input 
                type="text" 
                name="telefono"
                class="form-control"
                required>
        </div>
        <div class="mb-3">
            <label>Fecha reserva</label>
            <input 
                type="date" 
                name="fecha_reserva"
                class="form-control"
                required>
        </div>
        <div class="mb-3">
            <label>Hora</label>
            <input 
                type="time" 
                name="hora_reserva"
                step="1"
                required>
        </div>
        <div class="mb-3">
            <label>Cantidad de personas</label>
            <input 
                type="number" 
                name="cantidad_personas"
                min="1"
                max="15"
                class="form-control"
                required>
        </div>
        <div class="mb-3">
            <label>Estado</label>

            <select name="estado" class="form-control">

                <option value="COMPLETADA">
                    COMPLETADA
                </option>

                <option value="ANULADA">
                    ANULADA
                </option>

                <option value="NO ASISTEN">
                    NO ASISTEN
                </option>

            </select>

        </div>
        <div class="mb-3">
            <label>Mesa:</label>
            
            <select name="mesa" required>
                <option value="">
                    Seleccione una mesa
                </option>
                
                {% for mesa in mesas %}
                <option value="{{ mesa.id }}">
                    Mesa {{ mesa.numero }} - Capacidad {{ mesa.capacidad }}
                </option>

                {% endfor %}

            </select>

        <div class="mb-3">

            <label>Observación</label>

            <textarea
                name="observacion"
                class="form-control">
            </textarea>

        </div>
        <button class="btn btn-primary">
            Guardar Reserva
        </button>
        <a 
            href="{% url 'lista_reservas' %}"
            class="btn btn-secondary">
            Volver
        </a>
    </form>
</body>
</html>
